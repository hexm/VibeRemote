# ============================================================
# 通用基础配置 - 所有环境共享，不含任何敏感信息
# 环境特定配置请看 application-dev.yml / application-prod.yml
# ============================================================

server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
  tomcat:
    max-swallow-size: 50MB
    max-http-form-post-size: 50MB

spring:
  application:
    name: lightscript-server
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

lightscript:
  jwt:
    expiration: 86400000  # 24 hours
  log:
    batch:
      enabled: true
      max-size: 1000
      max-request-size: 10MB
    compression:
      enabled: false
      types: [gzip]
  encryption:
    enabled: true
    key-rotation-days: 30
    max-time-skew: 300000  # 5分钟时间窗口
