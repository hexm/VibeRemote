server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
spring:
  application:
    name: lightscript-server
  datasource:
    # H2持久化模式 - 开发环境推荐
    url: jdbc:h2:file:./data/lightscript;MODE=MySQL;AUTO_SERVER=TRUE
    username: sa
    password: 
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: false
  h2:
    console:
      enabled: true  # 可选：启用H2控制台，访问 http://localhost:8080/h2-console
  security:
    user:
      name: admin
      password: admin123
      roles: ADMIN
logging:
  level:
    root: INFO
    com.example.lightscript.server: INFO
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql.BasicBinder: WARN
    org.springframework.web: WARN

lightscript:
  jwt:
    secret: lightscript-jwt-secret-key-2024
    expiration: 86400000  # 24 hours
  register:
    token: dev-register-token