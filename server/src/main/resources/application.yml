server:
  port: 8080
spring:
  application:
    name: lightscript-server
  datasource:
    url: jdbc:mysql://localhost:3306/lightscript?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
  security:
    user:
      name: admin
      password: admin123
      roles: ADMIN
logging:
  level:
    root: INFO
    com.example.lightscript.server: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

lightscript:
  jwt:
    secret: lightscript-jwt-secret-key-2024
    expiration: 86400000  # 24 hours
  register:
    token: dev-register-token