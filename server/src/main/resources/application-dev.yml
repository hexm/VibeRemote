spring:
  datasource:
    url: jdbc:mysql://8.138.114.34:3306/lightscript_dev?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&characterEncoding=utf8&autoReconnect=true&failOverReadOnly=false&maxReconnects=10
    username: lightscript_dev
    password: lightscript_dev123
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
      connection-timeout: 20000
      idle-timeout: 300000       # 5分钟，小于 MySQL wait_timeout(默认8小时)
      max-lifetime: 600000       # 10分钟，确保连接在 MySQL 关闭前主动回收
      keepalive-time: 60000      # 每60秒发一次 keepalive，防止连接被服务器关闭
      connection-test-query: SELECT 1
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  security:
    user:
      name: admin
      password: admin123

logging:
  level:
    com.example.lightscript: DEBUG
    org.springframework.security: WARN
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: WARN
  file:
    name: server/logs/server-dev.log

lightscript:
  jwt:
    secret: lightscript-dev-secret-key-for-testing-only-not-for-production
  register:
    token: dev-register-token
  log:
    storage:
      path: logs/tasks
    retention:
      days: 30
