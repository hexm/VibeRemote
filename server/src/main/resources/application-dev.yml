server:
  port: 8080

spring:
  application:
    name: lightscript-server
  
  # 使用远程MySQL数据库，但使用不同的数据库名和用户
  datasource:
    url: jdbc:mysql://8.138.114.34:3306/lightscript_dev?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&characterEncoding=utf8&autoReconnect=true&failOverReadOnly=false&maxReconnects=10
    username: lightscript_dev
    password: lightscript_dev123
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000
      leak-detection-threshold: 60000
  
  h2:
    console:
      enabled: true
      path: /h2-console
  
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: false
  
  # 禁用安全功能以快速启动
  security:
    enabled: false

logging:
  level:
    com.example.lightscript: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql.BasicBinder: WARN
  file:
    name: server/logs/server-dev.log
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# 应用配置
lightscript:
  jwt:
    secret: lightscript-dev-secret-key-for-testing-only
    expiration: 86400000
  register:
    token: dev-register-token
  log:
    storage:
      path: logs/tasks  # 日志文件存储根目录
    retention:
      days: 30  # 开发环境保留30天
