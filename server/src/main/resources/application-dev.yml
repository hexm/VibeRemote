server:
  port: 8080

spring:
  application:
    name: lightscript-server
  
  # 使用内存数据库快速启动
  datasource:
    url: jdbc:h2:mem:lightscript
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  
  h2:
    console:
      enabled: true
      path: /h2-console
  
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: false
  
  # 禁用安全功能以快速启动
  security:
    enabled: false

logging:
  level:
    com.example.lightscript: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql.BasicBinder: WARN

# 应用配置
lightscript:
  jwt:
    secret: lightscript-dev-secret-key-for-testing-only
    expiration: 86400000
  register:
    token: dev-register-token
