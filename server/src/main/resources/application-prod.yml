spring:
  application:
    name: lightscript-server
  
  datasource:
    url: jdbc:h2:file:/opt/lightscript/data/lightscript
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  
  h2:
    console:
      enabled: false  # 生产环境关闭H2控制台
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false  # 生产环境关闭SQL日志
    properties:
      hibernate:
        format_sql: false

server:
  port: 8080
  address: 0.0.0.0  # 监听所有网络接口

logging:
  level:
    root: INFO
    com.example.lightscript: INFO
  file:
    name: /opt/lightscript/logs/lightscript-server.log
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# JWT配置
jwt:
  secret: lightscript-production-secret-key-change-this-in-production
  expiration: 86400000  # 24小时

# CORS配置
cors:
  allowed-origins: 
    - http://8.138.114.34:3000
    - http://localhost:3000
  allowed-methods: GET,POST,PUT,DELETE,OPTIONS
  allowed-headers: "*"
  allow-credentials: true
