spring:
  application:
    name: lightscript-server
  
  datasource:
    # MySQL数据库配置
    url: jdbc:mysql://8.138.114.34:3306/lightscript?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&characterEncoding=utf8&autoReconnect=true&failOverReadOnly=false&maxReconnects=10
    username: lightscript
    password: lightscript123
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false  # 生产环境关闭SQL日志
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: false

server:
  port: 8080
  address: 0.0.0.0  # 监听所有网络接口

logging:
  level:
    root: INFO
    com.example.lightscript: INFO
  file:
    name: /opt/lightscript/logs/lightscript-server.log
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# JWT配置
jwt:
  secret: lightscript-production-secret-key-change-this-in-production
  expiration: 86400000  # 24小时

# CORS配置
cors:
  allowed-origins: 
    - http://8.138.114.34:3000
    - http://localhost:3000
  allowed-methods: GET,POST,PUT,DELETE,OPTIONS
  allowed-headers: "*"
  allow-credentials: true
